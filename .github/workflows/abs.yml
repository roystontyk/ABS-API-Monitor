name: ABS Data Monitor

on:
# 🔴 NEW: This allows the iPhone/Orchestrator to trigger this repo
  repository_dispatch:
    types: [trigger-all-repos]
    
  # Standard daily schedule (e.g., 7:30 AM Sydney/Brisbane time)
  schedule:
    - cron: '30 21 * * *' 
    
  # Manual trigger button for your iPhone Shortcut
  workflow_dispatch:

jobs:
  check-abs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # FIX: Added beautifulsoup4 here
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Monitor
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
