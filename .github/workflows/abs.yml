name: ABS Data Monitor

on:
  schedule:
    # 00:45 UTC is 11:45 AM AEDT (Summer) / 10:45 AM AEST (Winter)
    # This runs every Monday (1) and Wednesday (3)
    - cron: '45 0 * * 1,3'
  
  # This line enables the "Run workflow" button in GitHub Actions
  workflow_dispatch:

jobs:
  check-abs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
        
      - name: Run ABS Monitor
        run: python abs_monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
